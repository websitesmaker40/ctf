<html>

<body>
	<h1>General Store</h1>
	<h2>
		If you're looking for supplies, you've come to the right place!
	</h2>
	<form action="/" method="post">
		<input type="hidden" value="<%= @jwt %>" name="jwt" />

		<h3>Food</h3>

		<%= for item <- @foodItems do %>
			<p>
				<label for="<%= item.name %>"><%= item.display %> - $<%= item.price %></label>
				<input type="number" id="<%= item.name %>" name="<%= item.name %>" min="0" value="0" />
			</p>
		<% end %>

		<h3>Equipment</h3>

		<%= for item <- @equipmentItems do %>
			<p>
				<label for="<%= item.name %>"><%= item.display %> - $<%= item.price %></label>
				<input type="number" id="<%= item.name %>" name="<%= item.name %>" min="0" value="0" />
			</p>
		<% end %>

		<h3>Consumables</h3>

		<%= for item <- @consumableItems do %>
			<p>
				<label for="<%= item.name %>"><%= item.display %> - $<%= item.price %></label>
				<input type="number" id="<%= item.name %>" name="<%= item.name %>" min="0" value="0" />
			</p>
		<% end %>

		<input type="submit" value="Buy Supplies" />
	</form>
</body>

</html>
